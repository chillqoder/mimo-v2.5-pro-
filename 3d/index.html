<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive 3D Glass Aquarium</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100vw; height: 100vh; overflow: hidden; background: #0a1628; }
  canvas { display: block; }
</style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Renderer ───
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// ─── Scene ───
const scene = new THREE.Scene();

// ─── Background gradient ───
const bgCanvas = document.createElement('canvas');
bgCanvas.width = 2; bgCanvas.height = 512;
const bgCtx = bgCanvas.getContext('2d');
const bgGrad = bgCtx.createLinearGradient(0, 0, 0, 512);
bgGrad.addColorStop(0, '#0a1628');
bgGrad.addColorStop(1, '#1a3a5c');
bgCtx.fillStyle = bgGrad;
bgCtx.fillRect(0, 0, 2, 512);
const bgTexture = new THREE.CanvasTexture(bgCanvas);
bgTexture.mapping = THREE.EquirectangularReflectionMapping;
scene.background = bgTexture;

// ─── Camera ───
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(6, 5, 8);

// ─── Controls ───
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.5, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 4;
controls.maxDistance = 20;
controls.maxPolarAngle = Math.PI * 0.85;
controls.update();

// ─── Aquarium dimensions ───
const TANK_W = 6, TANK_D = 4, TANK_H = 3;
const GLASS_THICKNESS = 0.06;
const MARGIN = 0.3;

// ─── Lighting ───
const ambientLight = new THREE.AmbientLight(0xb3e5fc, 0.4);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xfff8e1, 1.0);
dirLight.position.set(4, 8, 4);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 25;
dirLight.shadow.camera.left = -6;
dirLight.shadow.camera.right = 6;
dirLight.shadow.camera.top = 6;
dirLight.shadow.camera.bottom = -6;
scene.add(dirLight);

const tankLight = new THREE.PointLight(0xffe0b2, 0.8, 10);
tankLight.position.set(0, TANK_H - 0.2, 0);
tankLight.castShadow = true;
scene.add(tankLight);

// Subtle caustic on the floor
const causticLight = new THREE.PointLight(0x80d8ff, 0.25, 8);
causticLight.position.set(0, 0.5, 0);
scene.add(causticLight);

// ─── Glass material ───
const glassMat = new THREE.MeshPhysicalMaterial({
  color: 0xe0f7fa,
  transmission: 0.95,
  roughness: 0.05,
  thickness: 0.15,
  ior: 1.5,
  transparent: true,
  opacity: 0.18,
  side: THREE.DoubleSide,
  envMapIntensity: 1.0,
});

// ─── Build Aquarium ───
function buildAquarium() {
  const tank = new THREE.Group();
  const hw = TANK_W / 2, hd = TANK_D / 2, h = TANK_H;
  const t = GLASS_THICKNESS;

  // Bottom
  const bottomGeo = new THREE.BoxGeometry(TANK_W, t, TANK_D);
  const bottom = new THREE.Mesh(bottomGeo, glassMat);
  bottom.position.y = 0;
  bottom.receiveShadow = true;
  tank.add(bottom);

  // Front wall
  const frontGeo = new THREE.BoxGeometry(TANK_W, h, t);
  const front = new THREE.Mesh(frontGeo, glassMat);
  front.position.set(0, h / 2, hd);
  tank.add(front);

  // Back wall
  const back = front.clone();
  back.position.z = -hd;
  tank.add(back);

  // Left wall
  const sideGeo = new THREE.BoxGeometry(t, h, TANK_D);
  const left = new THREE.Mesh(sideGeo, glassMat);
  left.position.set(-hw, h / 2, 0);
  tank.add(left);

  // Right wall
  const right = left.clone();
  right.position.x = hw;
  tank.add(right);

  // Top rim (matte black frame)
  const rimMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.8, metalness: 0.3 });
  const rimH = 0.08, rimW = 0.12;

  // Front rim
  const rimFrontGeo = new THREE.BoxGeometry(TANK_W + rimW * 2, rimH, rimW);
  const rimFront = new THREE.Mesh(rimFrontGeo, rimMat);
  rimFront.position.set(0, h + rimH / 2, hd + rimW / 2);
  tank.add(rimFront);
  // Back rim
  const rimBack = rimFront.clone();
  rimBack.position.z = -hd - rimW / 2;
  tank.add(rimBack);
  // Left rim
  const rimSideGeo = new THREE.BoxGeometry(rimW, rimH, TANK_D + rimW * 2);
  const rimLeft = new THREE.Mesh(rimSideGeo, rimMat);
  rimLeft.position.set(-hw - rimW / 2, h + rimH / 2, 0);
  tank.add(rimLeft);
  // Right rim
  const rimRight = rimLeft.clone();
  rimRight.position.x = hw + rimW / 2;
  tank.add(rimRight);

  // Stand/base
  const standGeo = new THREE.BoxGeometry(TANK_W + 0.4, 0.5, TANK_D + 0.4);
  const standMat = new THREE.MeshStandardMaterial({ color: 0x2c1810, roughness: 0.7, metalness: 0.1 });
  const stand = new THREE.Mesh(standGeo, standMat);
  stand.position.y = -0.25;
  stand.receiveShadow = true;
  stand.castShadow = true;
  tank.add(stand);

  return tank;
}

const aquarium = buildAquarium();
scene.add(aquarium);

// ─── Water volume ───
const waterMat = new THREE.MeshPhysicalMaterial({
  color: 0x1e88e5,
  transparent: true,
  opacity: 0.18,
  roughness: 0.1,
  side: THREE.DoubleSide,
});

// Water surface with vertex displacement
const waterSurfaceGeo = new THREE.PlaneGeometry(TANK_W - 0.1, TANK_D - 0.1, 40, 40);
waterSurfaceGeo.rotateX(-Math.PI / 2);

const waterSurfaceMat = new THREE.ShaderMaterial({
  transparent: true,
  uniforms: {
    uTime: { value: 0 },
    uColor: { value: new THREE.Color(0x1e88e5) },
  },
  vertexShader: `
    uniform float uTime;
    varying vec2 vUv;
    void main() {
      vUv = uv;
      vec3 pos = position;
      pos.y += sin(pos.x * 3.0 + uTime * 1.5) * 0.02;
      pos.y += sin(pos.z * 2.5 + uTime * 1.2) * 0.015;
      pos.y += cos((pos.x + pos.z) * 2.0 + uTime) * 0.01;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
    }
  `,
  fragmentShader: `
    uniform vec3 uColor;
    uniform float uTime;
    varying vec2 vUv;
    void main() {
      float alpha = 0.22 + 0.08 * sin(vUv.x * 10.0 + uTime * 2.0);
      alpha += 0.05 * sin(vUv.y * 8.0 + uTime * 1.5);
      gl_FragColor = vec4(uColor, alpha);
    }
  `,
});

const waterSurface = new THREE.Mesh(waterSurfaceGeo, waterSurfaceMat);
waterSurface.position.y = TANK_H - 0.02;
scene.add(waterSurface);

// Water body (subtle volume below surface)
const waterBodyGeo = new THREE.BoxGeometry(TANK_W - 0.1, TANK_H - 0.1, TANK_D - 0.1);
const waterBody = new THREE.Mesh(waterBodyGeo, waterMat);
waterBody.position.y = (TANK_H - 0.1) / 2;
scene.add(waterBody);

// ─── Stones / Gravel ───
function createStones() {
  const group = new THREE.Group();
  const stoneColors = [0x8D6E63, 0xA1887F, 0x9E9E9E, 0x6D4C41, 0x795548, 0xBCAAA4];
  const count = 20;
  for (let i = 0; i < count; i++) {
    const geoType = Math.random() > 0.5 ? new THREE.SphereGeometry(1, 6, 5) : new THREE.DodecahedronGeometry(1, 0);
    const mat = new THREE.MeshStandardMaterial({
      color: stoneColors[Math.floor(Math.random() * stoneColors.length)],
      roughness: 0.85,
      metalness: 0.05,
    });
    const stone = new THREE.Mesh(geoType, mat);
    const sx = 0.08 + Math.random() * 0.18;
    const sy = 0.05 + Math.random() * 0.1;
    const sz = 0.08 + Math.random() * 0.18;
    stone.scale.set(sx, sy, sz);
    stone.position.set(
      (Math.random() - 0.5) * (TANK_W - 0.6),
      sy * 0.5 + 0.01,
      (Math.random() - 0.5) * (TANK_D - 0.6)
    );
    stone.rotation.y = Math.random() * Math.PI;
    stone.castShadow = true;
    stone.receiveShadow = true;
    group.add(stone);
  }
  return group;
}

scene.add(createStones());

// ─── Aquatic Plants ───
function createPlantCluster(cx, cz) {
  const group = new THREE.Group();
  const bladeCount = 5 + Math.floor(Math.random() * 4);
  const greens = [0x2E7D32, 0x388E3C, 0x1B5E20, 0x4CAF50, 0x33691E];
  const blades = [];

  for (let i = 0; i < bladeCount; i++) {
    const height = 0.8 + Math.random() * 1.2;
    const width = 0.06 + Math.random() * 0.06;
    const shape = new THREE.Shape();
    shape.moveTo(-width / 2, 0);
    shape.bezierCurveTo(-width / 2, height * 0.3, -width * 0.3, height * 0.7, 0, height);
    shape.bezierCurveTo(width * 0.3, height * 0.7, width / 2, height * 0.3, width / 2, 0);
    shape.closePath();

    const geo = new THREE.ExtrudeGeometry(shape, { depth: 0.005, bevelEnabled: false });
    const mat = new THREE.MeshStandardMaterial({
      color: greens[Math.floor(Math.random() * greens.length)],
      roughness: 0.7,
      metalness: 0.0,
      side: THREE.DoubleSide,
    });
    const blade = new THREE.Mesh(geo, mat);
    blade.position.set(
      (Math.random() - 0.5) * 0.2,
      0.05,
      (Math.random() - 0.5) * 0.2
    );
    blade.rotation.y = Math.random() * Math.PI * 2;
    blade.userData.phaseOffset = Math.random() * Math.PI * 2;
    blade.userData.swaySpeed = 0.8 + Math.random() * 0.5;
    blade.userData.swayAmount = 0.08 + Math.random() * 0.06;
    blade.userData.origRotZ = blade.rotation.z;
    blade.castShadow = true;
    group.add(blade);
    blades.push(blade);
  }

  group.position.set(cx, 0, cz);
  group.userData.blades = blades;
  return group;
}

const plants = [];
const plantPositions = [
  [-TANK_W / 2 + 0.5, -TANK_D / 2 + 0.5],
  [TANK_W / 2 - 0.5, -TANK_D / 2 + 0.5],
  [-TANK_W / 2 + 0.5, TANK_D / 2 - 0.5],
  [0, -TANK_D / 2 + 0.4],
  [TANK_W / 2 - 0.4, 0],
];

plantPositions.forEach(([x, z]) => {
  const p = createPlantCluster(x, z);
  scene.add(p);
  plants.push(p);
});

// ─── Clownfish Builder ───
const FISH_FORWARD = new THREE.Vector3(0, 0, 1);
const tmpVecA = new THREE.Vector3();
const tmpVecB = new THREE.Vector3();
const tmpVecC = new THREE.Vector3();
const tmpQuat = new THREE.Quaternion();
const obstacleColumns = plantPositions.map(([x, z], index) => ({
  center: new THREE.Vector3(x, 0.9 + (index % 2) * 0.15, z),
  radius: 0.35 + (index % 3) * 0.05,
  height: 1.8,
}));

function makeFinShape(width, height, tipInset = 0.18) {
  const shape = new THREE.Shape();
  shape.moveTo(0, 0);
  shape.quadraticCurveTo(width * 0.35, height * 0.75, width, height * (1 - tipInset));
  shape.quadraticCurveTo(width * 0.72, height * 0.15, 0, 0);
  return shape;
}

function applyShadowProps(object) {
  object.traverse(child => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });
}

function createClownfish(variant = {}) {
  const fish = new THREE.Group();
  const swimRoot = new THREE.Group();
  const visual = new THREE.Group();
  fish.add(swimRoot);
  swimRoot.add(visual);

  const hueShift = variant.hueShift ?? 0;
  const saturationShift = variant.saturationShift ?? 0;
  const brightnessShift = variant.brightnessShift ?? 0;
  const bodyStretch = variant.bodyStretch ?? 1;
  const bodyHeight = variant.bodyHeight ?? 1;
  const finScale = variant.finScale ?? 1;

  const bodyColor = new THREE.Color().setHSL(0.086 + hueShift, 0.95 - saturationShift, 0.5 + brightnessShift);
  const bodyAccent = new THREE.Color().setHSL(0.09 + hueShift * 0.4, 0.9 - saturationShift, 0.58 + brightnessShift * 0.75);
  const finColor = bodyColor.clone().lerp(new THREE.Color(0xffffff), 0.12);
  const stripeColor = new THREE.Color(0xf9f6ef);
  const edgeColor = new THREE.Color(0x111111);

  const bodyMat = new THREE.MeshStandardMaterial({
    color: bodyColor,
    roughness: 0.45,
    metalness: 0.05,
    flatShading: false,
  });
  const accentMat = new THREE.MeshStandardMaterial({
    color: bodyAccent,
    roughness: 0.5,
    metalness: 0.03,
  });
  const stripeMat = new THREE.MeshStandardMaterial({
    color: stripeColor,
    roughness: 0.32,
    metalness: 0.03,
  });
  const edgeMat = new THREE.MeshStandardMaterial({
    color: edgeColor,
    roughness: 0.7,
    metalness: 0.0,
  });
  const finMat = new THREE.MeshStandardMaterial({
    color: finColor,
    roughness: 0.5,
    metalness: 0.02,
    transparent: true,
    opacity: 0.92,
    side: THREE.DoubleSide,
  });

  const bodyFront = new THREE.Group();
  const bodyRear = new THREE.Group();
  const tailBase = new THREE.Group();
  const tailTip = new THREE.Group();

  visual.add(bodyFront);
  visual.add(bodyRear);
  bodyRear.position.z = -0.08;
  bodyRear.add(tailBase);
  tailBase.position.z = -0.48 * bodyStretch;
  tailBase.add(tailTip);
  tailTip.position.z = -0.18;

  const mainBodyGeo = new THREE.SphereGeometry(1, 30, 22);
  mainBodyGeo.scale(0.31, 0.3 * bodyHeight, 0.78 * bodyStretch);
  const mainBody = new THREE.Mesh(mainBodyGeo, bodyMat);
  mainBody.position.z = 0.01;
  bodyFront.add(mainBody);

  const headGeo = new THREE.SphereGeometry(1, 26, 18);
  headGeo.scale(0.255, 0.245 * bodyHeight, 0.28);
  const head = new THREE.Mesh(headGeo, bodyMat);
  head.position.set(0, 0.015, 0.5);
  bodyFront.add(head);

  const snoutGeo = new THREE.SphereGeometry(1, 18, 14);
  snoutGeo.scale(0.125, 0.11, 0.12);
  const snout = new THREE.Mesh(snoutGeo, accentMat);
  snout.position.set(0, -0.015, 0.68);
  bodyFront.add(snout);

  const bellyGeo = new THREE.SphereGeometry(1, 24, 16);
  bellyGeo.scale(0.245, 0.13, 0.54 * bodyStretch);
  const belly = new THREE.Mesh(bellyGeo, accentMat);
  belly.position.set(0, -0.11, 0.03);
  bodyFront.add(belly);

  const peduncleGeo = new THREE.SphereGeometry(1, 18, 14);
  peduncleGeo.scale(0.14, 0.14, 0.22);
  const peduncle = new THREE.Mesh(peduncleGeo, bodyMat);
  peduncle.position.z = -0.03;
  tailBase.add(peduncle);

  function addBand(parent, z, radius, width, scaleY = 1, tilt = 0) {
    const bandGeo = new THREE.CylinderGeometry(radius, radius, width, 24, 1, true);
    bandGeo.rotateX(Math.PI / 2);
    const whiteBand = new THREE.Mesh(bandGeo, stripeMat);
    whiteBand.scale.y = scaleY;
    whiteBand.rotation.z = tilt;
    whiteBand.position.z = z;
    parent.add(whiteBand);

    const edgeGeo = new THREE.TorusGeometry(radius * 1.02, 0.018, 8, 18);
    edgeGeo.rotateY(Math.PI / 2);
    const edgeFront = new THREE.Mesh(edgeGeo, edgeMat);
    edgeFront.scale.y = scaleY;
    edgeFront.rotation.z = tilt;
    edgeFront.position.z = z + width * 0.5;
    parent.add(edgeFront);

    const edgeBack = edgeFront.clone();
    edgeBack.position.z = z - width * 0.5;
    parent.add(edgeBack);
  }

  addBand(bodyFront, 0.34, 0.255, 0.085, 0.9, 0.03);
  addBand(bodyFront, 0.02, 0.275, 0.095, 0.96, -0.02);
  addBand(bodyRear, -0.14, 0.19, 0.085, 0.88, -0.04);

  const dorsalGeo = new THREE.PlaneGeometry(0.42 * bodyStretch, 0.2 * finScale, 1, 6);
  const dorsal = new THREE.Mesh(dorsalGeo, finMat);
  dorsal.position.set(0, 0.33 * bodyHeight, 0.02);
  dorsal.rotation.x = -Math.PI / 2;
  bodyFront.add(dorsal);

  const dorsalRearGeo = new THREE.PlaneGeometry(0.2, 0.09 * finScale, 1, 4);
  const dorsalRear = new THREE.Mesh(dorsalRearGeo, finMat);
  dorsalRear.position.set(0, 0.23 * bodyHeight, -0.16);
  dorsalRear.rotation.x = -Math.PI / 2;
  bodyRear.add(dorsalRear);

  const analGeo = new THREE.PlaneGeometry(0.2, 0.09 * finScale, 1, 4);
  const anal = new THREE.Mesh(analGeo, finMat);
  anal.position.set(0, -0.22 * bodyHeight, -0.13);
  anal.rotation.x = Math.PI / 2;
  bodyRear.add(anal);

  const tailShape = new THREE.Shape();
  tailShape.moveTo(0, 0);
  tailShape.bezierCurveTo(0.08, 0.1, 0.16, 0.16, 0.22, 0.18);
  tailShape.bezierCurveTo(0.3, 0.18, 0.38, 0.12, 0.44, 0.03);
  tailShape.bezierCurveTo(0.31, 0.01, 0.14, 0.0, 0, 0);
  tailShape.bezierCurveTo(0.14, 0.0, 0.31, -0.01, 0.44, -0.03);
  tailShape.bezierCurveTo(0.38, -0.12, 0.3, -0.18, 0.22, -0.18);
  tailShape.bezierCurveTo(0.16, -0.16, 0.08, -0.1, 0, 0);
  const tailGeo = new THREE.ExtrudeGeometry(tailShape, { depth: 0.03, bevelEnabled: false, curveSegments: 10 });
  tailGeo.translate(0, 0, -0.015);
  const tail = new THREE.Mesh(tailGeo, finMat);
  tail.scale.set(0.95 * finScale, 0.95 * finScale, 1);
  tail.rotation.y = Math.PI;
  tailTip.add(tail);

  const tailEdgeGeo = new THREE.TorusGeometry(0.16 * finScale, 0.012, 8, 18, Math.PI);
  tailEdgeGeo.rotateY(Math.PI / 2);
  const tailEdgeTop = new THREE.Mesh(tailEdgeGeo, edgeMat);
  tailEdgeTop.position.set(0.22 * finScale, 0.1 * finScale, 0);
  tailEdgeTop.rotation.z = 0.72;
  tailTip.add(tailEdgeTop);
  const tailEdgeBottom = tailEdgeTop.clone();
  tailEdgeBottom.position.y *= -1;
  tailEdgeBottom.rotation.z *= -1;
  tailTip.add(tailEdgeBottom);

  function createPectoral(sign) {
    const pivot = new THREE.Group();
    const shape = makeFinShape(0.22 * finScale, 0.14 * finScale, 0.15);
    const geo = new THREE.ExtrudeGeometry(shape, { depth: 0.01, bevelEnabled: false, curveSegments: 8 });
    geo.translate(0, -0.07 * finScale, -0.005);
    const mesh = new THREE.Mesh(geo, finMat);
    mesh.rotation.y = Math.PI * 0.5;
    if (sign < 0) mesh.scale.x = -1;
    pivot.add(mesh);
    pivot.position.set(sign * 0.25, -0.015, 0.2);
    pivot.rotation.set(sign * 0.1, sign > 0 ? -0.35 : 0.35, sign > 0 ? -0.35 : 0.35);
    bodyFront.add(pivot);
    return pivot;
  }

  const pecL = createPectoral(1);
  const pecR = createPectoral(-1);

  function createPelvic(sign) {
    const pivot = new THREE.Group();
    const geo = new THREE.PlaneGeometry(0.15 * finScale, 0.08 * finScale, 1, 2);
    const mesh = new THREE.Mesh(geo, finMat);
    pivot.add(mesh);
    pivot.position.set(sign * 0.08, -0.2, 0.08);
    pivot.rotation.set(Math.PI * 0.35, 0, sign > 0 ? -0.2 : 0.2);
    bodyFront.add(pivot);
    return pivot;
  }

  const pelvicL = createPelvic(1);
  const pelvicR = createPelvic(-1);

  function createEye(sign) {
    const eyeGroup = new THREE.Group();
    const eyeball = new THREE.Mesh(
      new THREE.SphereGeometry(0.055, 14, 10),
      new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.18, metalness: 0.04 })
    );
    eyeGroup.add(eyeball);

    const pupil = new THREE.Mesh(
      new THREE.SphereGeometry(0.026, 10, 8),
      new THREE.MeshStandardMaterial({ color: 0x060606, roughness: 0.8 })
    );
    pupil.position.set(sign * 0.022, -0.002, 0.026);
    eyeGroup.add(pupil);

    const highlight = new THREE.Mesh(
      new THREE.SphereGeometry(0.01, 8, 6),
      new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.45, roughness: 0.05 })
    );
    highlight.position.set(sign * 0.025, 0.016, 0.028);
    eyeGroup.add(highlight);

    eyeGroup.position.set(sign * 0.22, 0.075, 0.49);
    bodyFront.add(eyeGroup);
  }

  createEye(1);
  createEye(-1);

  const mouth = new THREE.Mesh(
    new THREE.TorusGeometry(0.055, 0.008, 6, 14, Math.PI),
    edgeMat
  );
  mouth.rotation.set(Math.PI * 0.5, 0, Math.PI);
  mouth.position.set(0, -0.04, 0.69);
  bodyFront.add(mouth);

  fish.userData.visual = visual;
  fish.userData.bodyFront = bodyFront;
  fish.userData.bodyRear = bodyRear;
  fish.userData.tailBase = tailBase;
  fish.userData.tailTip = tailTip;
  fish.userData.pecL = pecL;
  fish.userData.pecR = pecR;
  fish.userData.pelvicL = pelvicL;
  fish.userData.pelvicR = pelvicR;
  fish.userData.dorsal = dorsal;
  fish.userData.dorsalRear = dorsalRear;
  fish.userData.anal = anal;
  fish.userData.phaseOffset = variant.phaseOffset ?? Math.random() * Math.PI * 2;

  applyShadowProps(fish);
  return fish;
}

function randomTarget() {
  const hw = TANK_W / 2 - 0.55;
  const hd = TANK_D / 2 - 0.5;
  const target = new THREE.Vector3(
    THREE.MathUtils.randFloat(-hw, hw),
    THREE.MathUtils.randFloat(0.55, TANK_H - 0.45),
    THREE.MathUtils.randFloat(-hd, hd)
  );

  for (const obstacle of obstacleColumns) {
    const flatDist = Math.hypot(target.x - obstacle.center.x, target.z - obstacle.center.z);
    if (flatDist < obstacle.radius + 0.35 && target.y < obstacle.height) {
      target.x += (target.x - obstacle.center.x || 0.01) * 0.6;
      target.z += (target.z - obstacle.center.z || 0.01) * 0.6;
    }
  }

  return target;
}

function smoothStep(edge0, edge1, value) {
  const t = THREE.MathUtils.clamp((value - edge0) / (edge1 - edge0), 0, 1);
  return t * t * (3 - 2 * t);
}

// ─── Fish AI ───
class FishAI {
  constructor(fish, options = {}) {
    this.fish = fish;
    this.baseSpeed = options.baseSpeed ?? 0.75;
    this.speedVariance = options.speedVariance ?? 0.12;
    this.maxForce = options.maxForce ?? 1.2;
    this.turnLerp = options.turnLerp ?? 4.5;
    this.wanderStrength = options.wanderStrength ?? 0.22;
    this.bank = 0;
    this.target = randomTarget();
    this.retargetTimer = THREE.MathUtils.randFloat(2.5, 5.5);
    this.noiseOffset = THREE.MathUtils.randFloat(0, 1000);
    this.velocity = new THREE.Vector3(
      THREE.MathUtils.randFloatSpread(1),
      THREE.MathUtils.randFloatSpread(0.25),
      THREE.MathUtils.randFloatSpread(1)
    ).normalize().multiplyScalar(this.baseSpeed);
  }

  chooseTarget() {
    this.target.copy(randomTarget());
    this.retargetTimer = THREE.MathUtils.randFloat(2.5, 5.5);
  }

  update(dt, time, school) {
    const pos = this.fish.position;
    this.retargetTimer -= dt;
    if (this.retargetTimer <= 0 || pos.distanceToSquared(this.target) < 0.35 * 0.35) {
      this.chooseTarget();
    }

    const toTarget = tmpVecA.copy(this.target).sub(pos);
    const distanceToTarget = toTarget.length();
    if (distanceToTarget > 0.0001) toTarget.divideScalar(distanceToTarget);

    const speedPulse = 1 + Math.sin(time * 0.7 + this.noiseOffset) * this.speedVariance;
    const desiredSpeed = this.baseSpeed * speedPulse;
    const desiredVelocity = tmpVecB.copy(toTarget).multiplyScalar(desiredSpeed);

    const steering = tmpVecC.copy(desiredVelocity).sub(this.velocity).multiplyScalar(1.35);

    const hw = TANK_W / 2 - 0.42;
    const hd = TANK_D / 2 - 0.42;
    const minY = 0.42;
    const maxY = TANK_H - 0.35;
    const wallBuffer = 0.55;

    const wallForce = new THREE.Vector3();
    wallForce.x += smoothStep(hw - wallBuffer, hw, pos.x) * -1.8;
    wallForce.x += (1 - smoothStep(-hw, -hw + wallBuffer, pos.x)) * 1.8;
    wallForce.z += smoothStep(hd - wallBuffer, hd, pos.z) * -1.8;
    wallForce.z += (1 - smoothStep(-hd, -hd + wallBuffer, pos.z)) * 1.8;
    wallForce.y += smoothStep(maxY - wallBuffer, maxY, pos.y) * -1.4;
    wallForce.y += (1 - smoothStep(minY, minY + wallBuffer, pos.y)) * 1.4;
    steering.add(wallForce);

    const obstacleAvoid = new THREE.Vector3();
    for (const obstacle of obstacleColumns) {
      const dx = pos.x - obstacle.center.x;
      const dz = pos.z - obstacle.center.z;
      const flatDist = Math.hypot(dx, dz);
      if (flatDist < obstacle.radius + 0.45 && pos.y < obstacle.height) {
        const strength = 1 - flatDist / (obstacle.radius + 0.45);
        obstacleAvoid.x += (dx / Math.max(flatDist, 0.001)) * strength * 1.6;
        obstacleAvoid.z += (dz / Math.max(flatDist, 0.001)) * strength * 1.6;
        obstacleAvoid.y += 0.15 * strength;
      }
    }
    steering.add(obstacleAvoid);

    const separation = new THREE.Vector3();
    for (const other of school) {
      if (other === this) continue;
      const offset = tmpVecA.copy(pos).sub(other.fish.position);
      const distSq = offset.lengthSq();
      if (distSq > 0 && distSq < 0.95 * 0.95) {
        separation.add(offset.normalize().multiplyScalar((0.95 * 0.95 - distSq) * 1.4));
      }
    }
    steering.add(separation);

    const drift = new THREE.Vector3(
      Math.sin(time * 0.65 + this.noiseOffset),
      Math.sin(time * 0.45 + this.noiseOffset * 0.5) * 0.35,
      Math.cos(time * 0.6 + this.noiseOffset * 1.1)
    ).multiplyScalar(this.wanderStrength);
    steering.add(drift);

    steering.clampLength(0, this.maxForce);
    this.velocity.addScaledVector(steering, dt);

    const minSpeed = this.baseSpeed * 0.72;
    const maxSpeed = this.baseSpeed * 1.3;
    this.velocity.clampLength(minSpeed, maxSpeed);
    pos.addScaledVector(this.velocity, dt);

    pos.x = THREE.MathUtils.clamp(pos.x, -hw, hw);
    pos.y = THREE.MathUtils.clamp(pos.y, minY, maxY);
    pos.z = THREE.MathUtils.clamp(pos.z, -hd, hd);

    const direction = tmpVecA.copy(this.velocity).normalize();
    tmpQuat.setFromUnitVectors(FISH_FORWARD, direction);
    this.fish.quaternion.slerp(tmpQuat, 1 - Math.exp(-this.turnLerp * dt));

    const currentForward = tmpVecB.copy(FISH_FORWARD).applyQuaternion(this.fish.quaternion).normalize();
    const turnAmount = currentForward.clone().cross(direction).y;
    const bankTarget = THREE.MathUtils.clamp(-turnAmount * 1.8, -0.32, 0.32);
    this.bank += (bankTarget - this.bank) * (1 - Math.exp(-3.2 * dt));
    this.fish.userData.visual.rotation.z = this.bank;

    const speedRatio = THREE.MathUtils.clamp((this.velocity.length() - minSpeed) / (maxSpeed - minSpeed), 0, 1);
    const phase = time * THREE.MathUtils.lerp(5.5, 8.2, speedRatio) + this.fish.userData.phaseOffset;
    const tailAmp = THREE.MathUtils.lerp(0.24, 0.52, speedRatio);

    this.fish.userData.bodyFront.rotation.y = Math.sin(phase) * tailAmp * 0.08;
    this.fish.userData.bodyRear.rotation.y = Math.sin(phase - 0.35) * tailAmp * 0.22;
    this.fish.userData.tailBase.rotation.y = Math.sin(phase - 0.7) * tailAmp * 0.55;
    this.fish.userData.tailTip.rotation.y = Math.sin(phase - 1.05) * tailAmp * 1.05;
    this.fish.userData.tailTip.rotation.z = Math.cos(phase - 1.05) * tailAmp * 0.08;

    const pecFlap = Math.sin(time * 8 + this.noiseOffset) * (0.18 + (1 - speedRatio) * 0.18);
    this.fish.userData.pecL.rotation.z = -0.35 + pecFlap - this.bank * 0.3;
    this.fish.userData.pecR.rotation.z = 0.35 - pecFlap - this.bank * 0.3;
    this.fish.userData.pelvicL.rotation.z = -0.18 + Math.sin(phase + 0.4) * 0.08;
    this.fish.userData.pelvicR.rotation.z = 0.18 - Math.sin(phase + 0.4) * 0.08;
    this.fish.userData.dorsal.rotation.z = Math.sin(phase - 0.2) * 0.04;
    this.fish.userData.dorsalRear.rotation.z = Math.sin(phase - 0.6) * 0.06;
    this.fish.userData.anal.rotation.z = Math.sin(phase - 0.55) * 0.05;
    this.fish.userData.visual.position.y = Math.sin(time * 2.1 + this.noiseOffset) * 0.015;
  }
}

// ─── Create Clownfish ───
const fishList = [];
const fishData = [
  { scale: 0.62, baseSpeed: 0.68, pos: [-1.1, 1.35, 0.35], hueShift: -0.004, bodyStretch: 0.96, bodyHeight: 1.02, finScale: 0.92 },
  { scale: 0.66, baseSpeed: 0.75, pos: [0.25, 1.1, -0.55], hueShift: 0.0, bodyStretch: 1.0, bodyHeight: 1.0, finScale: 0.96 },
  { scale: 0.7, baseSpeed: 0.71, pos: [1.15, 1.6, 0.4], hueShift: 0.004, brightnessShift: 0.02, bodyStretch: 1.04, bodyHeight: 0.98, finScale: 1.0 },
];

fishData.forEach((fd, index) => {
  const fish = createClownfish({
    hueShift: fd.hueShift,
    saturationShift: fd.saturationShift,
    brightnessShift: fd.brightnessShift,
    bodyStretch: fd.bodyStretch,
    bodyHeight: fd.bodyHeight,
    finScale: fd.finScale,
    phaseOffset: index * 1.17,
  });
  fish.scale.setScalar(fd.scale);
  fish.position.set(...fd.pos);
  scene.add(fish);
  fishList.push(new FishAI(fish, {
    baseSpeed: fd.baseSpeed,
    speedVariance: 0.08 + index * 0.012,
    maxForce: 1.1 + index * 0.05,
    turnLerp: 4.2 + index * 0.22,
    wanderStrength: 0.16 + index * 0.015,
  }));
});

// ─── Bubbles ───
const bubbles = [];
const bubbleMat = new THREE.MeshPhysicalMaterial({
  color: 0xffffff,
  transmission: 0.9,
  roughness: 0.05,
  thickness: 0.1,
  ior: 1.33,
  transparent: true,
  opacity: 0.3,
});

const BUBBLE_SPAWN_RATE = 3; // per second per source
const bubbleSources = [
  new THREE.Vector3(-1.5, 0.1, -1),
  new THREE.Vector3(1.5, 0.1, 0.5),
];

let bubbleSpawnAccum = 0;

function spawnBubble() {
  bubbleSources.forEach(src => {
    if (Math.random() < 0.5) {
      const geo = new THREE.SphereGeometry(0.03 + Math.random() * 0.03, 8, 6);
      const b = new THREE.Mesh(geo, bubbleMat.clone());
      b.position.set(
        src.x + (Math.random() - 0.5) * 0.3,
        src.y,
        src.z + (Math.random() - 0.5) * 0.3
      );
      b.userData.speed = 0.01 + Math.random() * 0.008;
      b.userData.wobblePhase = Math.random() * Math.PI * 2;
      b.userData.wobbleAmp = 0.2 + Math.random() * 0.3;
      b.userData.origScale = b.scale.x;
      b.userData.startY = b.position.y;
      scene.add(b);
      bubbles.push(b);
    }
  });
}

function updateBubbles(dt) {
  bubbleSpawnAccum += dt;
  const spawnInterval = 1 / BUBBLE_SPAWN_RATE;
  while (bubbleSpawnAccum >= spawnInterval) {
    bubbleSpawnAccum -= spawnInterval;
    spawnBubble();
  }

  for (let i = bubbles.length - 1; i >= 0; i--) {
    const b = bubbles[i];
    b.position.y += b.userData.speed;
    b.position.x += Math.sin(b.position.y * 5 + b.userData.wobblePhase) * 0.002 * b.userData.wobbleAmp;
    b.position.z += Math.cos(b.position.y * 4 + b.userData.wobblePhase) * 0.002 * b.userData.wobbleAmp;

    // Shrink as approaching surface
    const progress = (b.position.y - b.userData.startY) / (TANK_H - b.userData.startY);
    const s = b.userData.origScale * (1 - progress * 0.5);
    b.scale.setScalar(Math.max(s, 0.005));

    // Remove at waterline
    if (b.position.y >= TANK_H - 0.1 || progress >= 1) {
      scene.remove(b);
      b.geometry.dispose();
      bubbles.splice(i, 1);
    }
  }
}

// ─── Floor ───
const floorGeo = new THREE.PlaneGeometry(30, 30);
floorGeo.rotateX(-Math.PI / 2);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x0d1b2a, roughness: 0.9 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.position.y = -0.5;
floor.receiveShadow = true;
scene.add(floor);

// ─── Animation Loop ───
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const time = clock.elapsedTime;

  // Update fish
  fishList.forEach(f => f.update(dt, time, fishList));

  // Update bubbles
  updateBubbles(dt);

  // Plant sway
  plants.forEach(plant => {
    plant.userData.blades.forEach(blade => {
      const sway = Math.sin(time * blade.userData.swaySpeed + blade.userData.phaseOffset) * blade.userData.swayAmount;
      blade.rotation.z = blade.userData.origRotZ + sway;
    });
  });

  // Water surface
  waterSurfaceMat.uniforms.uTime.value = time;

  controls.update();
  renderer.render(scene, camera);
}

// ─── Resize ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
